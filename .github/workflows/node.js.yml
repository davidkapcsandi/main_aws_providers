name: Continuous Integration
on:
  push:
    branches:
      - main

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Install dependencies
        run: npm install

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: 7

      - name: lint test
        run: npm run lint

      - name: unit test
        run: npm run test:unit

      - name: Cypress.io
        uses: cypress-io/github-action@v7.1.9
        with:
          start: npm run start:test
  deploy:
    name: Deploy to EC2 with CodeDeploy
    runs-on: ubuntu-latest
    needs: run_tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment bundle
        run: |
          zip -r revision.zip . \
            -x ".git/*" ".github/*" "node_modules/*" "cypress/videos/*" "cypress/screenshots/*"

      - name: Upload revision to S3
        run: |
          aws s3 cp revision.zip s3://${{ secrets.AWS_S3_BUCKET }}/revisions/revision-${{ github.sha }}.zip

      - name: Trigger CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name "${{ secrets.AWS_CODEDEPLOY_APPLICATION }}" \
            --deployment-group-name "${{ secrets.AWS_CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --s3-location bucket=${{ secrets.AWS_S3_BUCKET }},bundleType=zip,key=revisions/revision-${{ github.sha }}.zip
